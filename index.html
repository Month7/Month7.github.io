<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>简历</title>
  <link rel="stylesheet" type="text/css" href="main.css" />
  <script type="module" src="main.js"></script>
</head>
<body>
  <main class="content">
    <header class="content-hd">
      <section class="title">
        <div class="name">
          <h1>姓名 <small>求职简历</small></h1>
        </div>
        <div class="job">
          <h2>Web 前端开发工程师</h2>
        </div>
      </section>
      <section class="info">
        <ul>
          <li>性别 / 出生日期 / 籍贯</li>
          <li>学校 / 专业</li>
          <li>学历 / 毕业时间</li>
        </ul>
      </section>
      <section class="contact">
        <ul>
          <resume-contact-item type="github" link="https://github.com/username" text="github:https://github.com/username"></resume-contact-item>
          <resume-contact-item type="email" link="mailto:email@example.com" text="email:email@example.com"></resume-contact-item>
          <resume-contact-item type="phone" link="tel:13800138000" text="phone:13800138000"></resume-contact-item>
        </ul>
      </section>
    </header>

    <div class="content-bd">
      <div class="content-left">
        <section class="practice">
          <resume-section-header title="经历"></resume-section-header>
          <div class="section-bd" id="experience-container">
            <!-- 经历内容将通过 JS 动态生成 -->
          </div>
        </section>
      </div>
      <div class="content-right">
        <section class="skill">
          <resume-section-header title="技能"></resume-section-header>
          <div class="section-bd" id="skill-container">
            <!-- 技能内容将通过 JS 动态生成 -->
          </div>
        </section>
      </div>
    </div>
  </main>

</body>
</html>
